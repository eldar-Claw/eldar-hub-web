name: EIH Auto Update

on:
  # Run 5 times daily (IST = UTC+3, so subtract 3 hours)
  # 08:30 IST = 05:30 UTC
  # 13:00 IST = 10:00 UTC
  # 17:00 IST = 14:00 UTC
  # 19:00 IST = 16:00 UTC
  # 21:00 IST = 18:00 UTC
  schedule:
    - cron: '30 5 * * *'    # 08:30 IST
    - cron: '0 10 * * *'    # 13:00 IST
    - cron: '0 14 * * *'    # 17:00 IST
    - cron: '0 16 * * *'    # 19:00 IST
    - cron: '0 18 * * *'    # 21:00 IST
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-eih:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run EIH Update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: python scripts/update_eih.py

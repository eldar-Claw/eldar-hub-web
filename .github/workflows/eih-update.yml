name: EIH Auto Update

on:
  schedule:
    - cron: '30 5 * * *'    # 08:30 IST
    - cron: '0 10 * * *'    # 13:00 IST
    - cron: '0 14 * * *'    # 17:00 IST
    - cron: '0 16 * * *'    # 19:00 IST
    - cron: '0 18 * * *'    # 21:00 IST
  workflow_dispatch:

jobs:
  update-eih:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python deps
        run: pip install requests openai
      
      - name: Run EIH Update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: python scripts/update_eih.py
      
      - name: Install deps and build
        run: |
          npm install
          npm run build
      
      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          mkdir -p .vercel
          echo '{"projectId":"prj_TXWvhbnjHZqunhRa6ZVCkFLJnYfn","orgId":"team_iKHrrl11TxRIGdzvlzV54AtB"}' > .vercel/project.json
          vercel --yes --prod --token ${{ secrets.VERCEL_TOKEN }}
